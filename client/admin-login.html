<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Login | BrightMind Tutors</title>
        <link rel="stylesheet" href="./css/global.css">
        <link rel="stylesheet" href="./css/layout.css">
        <link rel="stylesheet" href="./css/components.css">
        <link rel="stylesheet" href="./css/booking.css">
        <link rel="stylesheet" href="./css/admin-login.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/tutor-logo.svg">
    </head>
    <body>
        <div class="booking-page admin-login-page page-shell">

                <form class="booking-form surface-card admin-login-form" action="./admin.html">
                    <section class="booking-step active">
                        <div class="step-heading">
                            <span>Admin access</span>
                            <h2>Log in</h2>
                        </div>

                        <div class="details admin-login-fields">
                            <label class="date-field">
                                <input type="text" class="form-control" name="admin-name" placeholder="Enter admin name" autocomplete="username" required>
                            </label>
                            <label class="date-field">
                                <input type="password" class="form-control" name="admin-password" placeholder="Enter password" autocomplete="current-password" required>
                            </label>
                        </div>
                    </section>

                    <div class="booking-actions admin-login-actions">
                        <a href="./index.html" class="cta-btn blue">Back</a>
                        <button type="submit" class="cta-btn gold">
                            Log in
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>
        </div>
    </body>
</html>
