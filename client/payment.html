<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Payement | BrightMind Tutors</title>
        <link rel="stylesheet" href="./css/global.css">
        <link rel="stylesheet" href="./css/layout.css">
        <link rel="stylesheet" href="./css/components.css">
        <link rel="stylesheet" href="./css/payment.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/tutor-logo.svg">
        <script type="module" src="./js/srcipts/dAuth.js"></script>
    </head>
    <body>
        <div class="payment-page page-shell">
            <header class="header">
                    <div class="logo">
                        <img src="./assets/icons/tutor-logo.svg" alt="BrightMind logo">
                        <p>BrightMind Tutors</p>
                    </div>
                    <nav class="navbar d">
                            <div class="cross-btn close-nav-btn">
                                <i class="fa-solid fa-xmark"></i>
                            </div>
                            <div class="profile">
                                <div class="profile-img">
                                    <img src="./assets/images/avatars/profiles/vector-flat-illustration-grayscale-avatar-600nw-2264922221.webp" alt="user profile picture">
                                </div>
                                <div class="profile-info">
                                    <p class="profile-name">Daniel</p>
                                    <a href="/dashboard/profile">
                                        My profile 
                                        <i class="fa-solid fa-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                            <div class="more-links">
                                <div class="link">
                                    <i class="fa-solid fa-book"></i>
                                    <a href="/dashboard/book"><button class="">Book a tutor</button></a>
                                </div>
                                <div class="link">
                                    <i class="fa-solid fa-receipt"></i>
                                    <a href="./my-payments.html"><button class="">My payments</button></a>
                                </div>
                                <div class="link">
                                    <i class="fa-solid fa-star"></i>
                                    <a href="/dashboard/review"><button class="">Reviews</button></a>
                                </div>
                                <div class="link">
                                    <i class="fa-solid fa-graduation-cap"></i>
                                    <a href="/become-a-tutor"><button class="">Become a tutor</button></a>
                                </div>
                                <button type="submit" class="cta-btn gold">Log out</button>
                            </div>
                    </nav>
                    <div class="nav-btn d">
                        <img src="./assets/icons/menu.svg" alt="menu icon">
                    </div>

                    <div class="nav-btn-wrapper">
                        <div class="cross-btn dashboard-close-nav-btn">
                            <i class="fa-solid fa-xmark"></i>
                        </div>
                        <div class="dashboard-nav-btn active">
                            <img src="./assets/icons/menu.svg" alt="menu icon">
                        </div>
                        <nav class="navbar dashboard-navbar">
                                <div class="profile">
                                    <div class="profile-img">
                                        <img src="./assets/images/avatars/profiles/vector-flat-illustration-grayscale-avatar-600nw-2264922221.webp" alt="user profile picture">
                                    </div>
                                    <div class="profile-info">
                                        <p class="profile-name">Daniel</p>
                                        <a href="/dashboard/profile">
                                            My profile 
                                            <i class="fa-solid fa-arrow-right"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="link">
                                    <i class="fa-solid fa-book"></i>
                                    <a href="/dashboard/book"><button class="">Book a tutor</button></a>
                                </div>
                                <div class="link">
                                    <i class="fa-solid fa-receipt"></i>
                                    <a href="./my-payments.html"><button class="">My payments</button></a>
                                </div>
                                <div class="link active">
                                    <i class="fa-solid fa-star"></i>
                                    <a href="/dashboard/review"><button class="">Review</button></a>
                                </div>
                                <div class="link">
                                    <i class="fa-solid fa-graduation-cap"></i>
                                    <a href="/become-a-tutor"><button class="">Become a tutor</button></a>
                                </div>
                                <a href="/logout"><button type="submit" class="cta-btn gold">Log out</button></a>
                            <div class="more-links">
                                
                            </div>
                        </nav>
                    </div>
            </header>

            <main class="payment-main page-main">
                <section class="payment-section surface-card">
                    <div class="section-heading">
                        <p class="eyebrow">Payment dteails</p>
                        <h2>Provide your payment details below</h2>
                    </div>
                    <div class="payment-links">
                            <button class="payment-link">
                                    <div>
                                        <img src="./assets/icons/google.svg" alt="google pay icon">
                                        Google Pay
                                    </div>
                                </button>
                                <button class="payment-link">
                                    <div>
                                        <img src="./assets/icons/apple-pay.svg" alt="appple pay icon">
                                        Apple Pay
                                    </div>
                                    
                                </button>
                                <button class="payment-link">
                                    <div>
                                        <img src="./assets/icons/paypal(1).svg" alt="paypal icon">
                                        Paypal
                                    </div>
                                    
                                </button>
                        </div>
                        <div class="or-divider">or</div>
                    <form class="payment-form">
                        <div class="payment-field-group">
                                <div class="payment-field">
                                    <label>
                                        Card Number
                                    </label>
                                    <input type="text" class="form-control" placeholder="********">
                                    <div class="card-type">
                                        <img src="./assets/icons/visa.svg" alt="card type">
                                    </div>
                                </div>
                                
                            <div class="payment-field">
                                <label>
                                    Card Holder Name
                                </label>
                                <input type="email" class="form-control" placeholder="">
                            </div>
                        </div>
                        <div class="payment-stuff">
                                <div class="payment-field">
                                    <label for="">
                                        Expiry Date
                                    </label>
                                    <input type="text" class="form-control" name="" id="">
                                </div>
                                <div class="payment-field">
                                    <label for="">
                                        CVV/VV2
                                    </label>
                                    <input type="text" class="form-control" name="" id="">
                                </div>
                            
                        </div>
                        
                        <div class="payment-amount">
                            <p>Total amount</p>
                            <div class="payment-amount">
                                <img width="24" height="24" src="https://img.icons8.com/material-outlined/24/naira.png" alt="naira" class="currency-icon">
                                <span class="amount">30,000</span>
                            </div>
                        </div>
                        <button class="cta-btn gold payment-btn" type="submit">
                            Pay
                            <!-- <span> -->
                                <i class="fa-solid fa-arrow-right"></i>
                                <!-- 30,000 -->
                            <!-- </span> -->
                        </button>
                    </form>
                </section>
                <div class="alert payment-success inactive">
                    <div class="alert__hero">
                        <div class="hero-content">
                            <p class="eyebrow">Payment status</p>
                            <h2>Payment Successfull</h2>
                            <p>Lorem ipsum dolor sit amet consectetur adipisi</p>
                            <div class="hero-actions">
                                <a href="#application" class="cta-btn blue">
                                    Back to dashboard
                                </a>
                                <a href="#process" class="cta-btn gold">
                                    View reciept
                                    <i class="fa-solid fa-arrow-right"></i>
                                </a>
                            </div>
                        </div>
                        <div class="alert__icon">
                            <img src="./assets/icons/icon-checkbox-check.svg" alt="BrightMind tutor">
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <div class="overlay"></div>
        <script type="module" src="./js/srcipts/dNavMenu.js"></script>
    </body>
</html>
